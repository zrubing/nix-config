---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: multica-rollup-task-usage-hourly
  namespace: multica
spec:
  schedule: '*/5 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            kubernetes.io/hostname: nova13
          tolerations:
            - key: dedicated
              operator: Equal
              value: nova13
              effect: NoSchedule
          restartPolicy: OnFailure
          containers:
            - name: rollup
              image: pgvector/pgvector:pg17
              imagePullPolicy: IfNotPresent
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: multica-secrets
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -ec
                - |
                  psql -h multica-postgres -U multica -d multica \
                    -c "SELECT rollup_task_usage_hourly();"
