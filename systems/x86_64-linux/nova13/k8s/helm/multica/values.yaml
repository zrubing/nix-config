images:
  backend:
    tag: v0.3.11
  frontend:
    tag: v0.3.11

postgres:
  persistence:
    size: 10Gi
    storageClass: local-path

backend:
  replicas: 1
  uploads:
    persistence:
      size: 5Gi
      storageClass: local-path
  config:
    appEnv: production
    appUrl: http://multica.hinihao.net
    frontendOrigin: http://multica.hinihao.net
    googleRedirectUri: http://multica.hinihao.net/auth/callback
    localUploadBaseUrl: http://multica-api.hinihao.net
    allowSignup: true
    disableWorkspaceCreation: false

frontend:
  replicas: 1
  compatibility:
    backendAlias: true

ingress:
  enabled: false

existingSecret: multica-secrets
