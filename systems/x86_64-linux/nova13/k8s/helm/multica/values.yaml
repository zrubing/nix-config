images:
  backend:
    tag: v0.3.11
  frontend:
    tag: v0.3.11

postgres:
  persistence:
    size: 10Gi
    storageClass: local-path

backend:
  replicas: 1
  uploads:
    persistence:
      size: 5Gi
      storageClass: local-path
  config:
    appEnv: development
    appUrl: http://multica.local
    frontendOrigin: http://multica.local
    googleRedirectUri: http://multica.local/auth/callback
    localUploadBaseUrl: http://multica-api.local
    allowSignup: true
    allowedEmails: ""
    allowedEmailDomains: ""
    disableWorkspaceCreation: true

frontend:
  replicas: 1
  compatibility:
    backendAlias: true

ingress:
  enabled: false

existingSecret: multica-secrets
